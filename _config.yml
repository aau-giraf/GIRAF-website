# Site settings
title: GIRAF
description: Digital tools for autistic children - developed at Aalborg University since 2011
author: nbhansen
email: nbha@cs.aau.dk

# Theme
# theme: millennial

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/
paginate_path: /blog/page:num/

# GitHub Pages settings
url: "https://giraf.cs.aau.dk"
baseurl: ""

# Jekyll plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-archives

# Millennial theme settings
menu:
  - title: "About GIRAF"
    url: "/about/"
  - title: "Our Apps"
    url: "/apps/"
  - title: "History"
    url: "/history/"
  - title: "For Students"
    url: "/students/"
  - title: "Contact"
    url: "/contact/"

# Social links
github_username: aau-giraf
email: nbha@cs.aau.dk

# Google Analytics
google_analytics:

# Default layouts
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md