<header class="site-header">
  <div class="header-container">
    <a href="{{ "/" | relative_url }}" class="site-brand">
      <img src="{{ '/assets/img/giraf-logo.png' | relative_url }}" alt="GIRAF Logo" class="site-logo">
      <span class="site-title">GIRAF</span>
    </a>

    <nav class="nav-menu">
      {% for item in site.data.settings.menu %}
        <a href="{{ item.url | relative_url }}" class="nav-link {% if page.url == item.url %}active{% endif %}">{{ item.name }}</a>
      {% endfor %}
    </nav>

    <button class="mobile-menu-btn" type="button" aria-label="Menu" aria-expanded="false" aria-controls="mobile-dropdown" onclick="var d=document.querySelector('.mobile-dropdown').classList.toggle('open');this.setAttribute('aria-expanded',d)">
      {% include icon.html name="bars" %}
    </button>
  </div>

  <div class="mobile-dropdown" id="mobile-dropdown">
    {% for item in site.data.settings.menu %}
      <a href="{{ item.url | relative_url }}" class="nav-link">{{ item.name }}</a>
    {% endfor %}
  </div>
</header>
