<header class="site-header">
  <a href="{{ "/" | relative_url }}" class="site-brand">
    <img src="{{ '/assets/img/giraf-logo.png' | relative_url }}" alt="GIRAF Logo" class="site-logo">
    <span class="site-title">{{ site.title }}</span>
  </a>
  <nav class="menu-list">
    {% for item in site.data.settings.menu %}
      <a href="{{ item.url | relative_url }}" class="menu-link">{{ item.name }}</a>
    {% endfor %}
    {% for item in site.data.settings.social %}
      <a href="{{ item.link }}" class="menu-link" target="_blank"><i class="fa fa-{{ item.icon }}" aria-hidden="true"></i></a>
    {% endfor %}
  </nav>
  <div class="dropdown">
    <button class="dropbtn"><i class="fa fa-bars" aria-hidden="true"></i></button>
    <div class="dropdown-content">
      {% for item in site.data.settings.menu %}
        <a href="{{ item.url | relative_url }}" class="menu-link">{{ item.name }}</a>
      {% endfor %}
      {% for item in site.data.settings.social %}
        <a href="{{ item.link }}" class="menu-link" target="_blank"><i class="fa fa-{{ item.icon }}" aria-hidden="true"></i></a>
      {% endfor %}
    </div>
  </div>
</header>
