<aside class="news-feed">
  <h3>Recent News</h3>
  <ul class="news-feed-list">
    {% for post in site.posts limit:10 %}
      <li>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        <span class="post-date">{{ post.date | date: "%b %-d, %Y" }}</span>
      </li>
    {% endfor %}
  </ul>
</aside>
