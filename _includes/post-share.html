<div class="post-share">
  <div class="post-date">{{ site.data.settings.sharing_button_prompt }}</div>
  <div class="sharing-icons">
    <a href="https://twitter.com/intent/tweet?text={{ page.title }}&amp;url={{ page.url | absolute_url }}" target="_blank" rel="noopener" aria-label="Share on Twitter">{% include icon.html name="twitter" %}</a>
    <a href="https://www.facebook.com/sharer/sharer.php?u={{ page.url | absolute_url }}&amp;title={{ page.title }}" target="_blank" rel="noopener" aria-label="Share on Facebook">{% include icon.html name="facebook" %}</a>
  </div>
</div>
