---
layout: default
---

<div class="page-header">
  <div class="page-header-content">
    <h1>{{ page.title }}</h1>
    {% if page.description %}
    <p class="page-description">{{ page.description }}</p>
    {% endif %}
  </div>
</div>

<div class="page-content">
  <article>
    {{ content }}
  </article>
</div>
