<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle - soft GIRAF amber -->
  <circle cx="50" cy="50" r="48" fill="#feb656" fill-opacity="0.2"/>

  <!-- Body -->
  <ellipse cx="50" cy="62" rx="22" ry="18" fill="#feb656"/>

  <!-- Neck -->
  <path d="M 42 50 Q 38 30 45 18 Q 48 14 52 14 Q 58 14 60 20 Q 62 26 58 50" fill="#feb656"/>

  <!-- Head -->
  <ellipse cx="52" cy="16" rx="12" ry="10" fill="#feb656"/>

  <!-- Ears -->
  <ellipse cx="42" cy="10" rx="4" ry="6" fill="#feb656" transform="rotate(-20 42 10)"/>
  <ellipse cx="62" cy="10" rx="4" ry="6" fill="#feb656" transform="rotate(20 62 10)"/>

  <!-- Ear tips (darker amber) -->
  <circle cx="46" cy="6" r="3" fill="#e8820c"/>
  <circle cx="58" cy="6" r="3" fill="#e8820c"/>

  <!-- Body spots -->
  <circle cx="45" cy="28" r="4" fill="#e8820c" fill-opacity="0.8"/>
  <circle cx="55" cy="35" r="3" fill="#e8820c" fill-opacity="0.8"/>
  <circle cx="48" cy="42" r="3.5" fill="#e8820c" fill-opacity="0.8"/>
  <circle cx="38" cy="58" r="5" fill="#e8820c" fill-opacity="0.8"/>
  <circle cx="50" cy="55" r="4" fill="#e8820c" fill-opacity="0.8"/>
  <circle cx="62" cy="60" r="5" fill="#e8820c" fill-opacity="0.8"/>
  <circle cx="55" cy="68" r="4" fill="#e8820c" fill-opacity="0.8"/>
  <circle cx="42" cy="70" r="3.5" fill="#e8820c" fill-opacity="0.8"/>

  <!-- Eye -->
  <ellipse cx="48" cy="15" rx="3" ry="3.5" fill="#1f2937"/>
  <circle cx="47" cy="14" r="1" fill="#ffffff"/>

  <!-- Nose/cheek -->
  <ellipse cx="58" cy="18" rx="6" ry="5" fill="#fecaca"/>
  <circle cx="60" cy="17" r="1" fill="#e8820c" fill-opacity="0.5"/>

  <!-- Smile -->
  <path d="M 55 21 Q 58 24 62 21" fill="none" stroke="#1f2937" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Legs - positioned to connect with body -->
  <rect x="34" y="74" width="6" height="17" rx="3" fill="#feb656"/>
  <rect x="44" y="74" width="6" height="17" rx="3" fill="#feb656"/>
  <rect x="54" y="74" width="6" height="17" rx="3" fill="#feb656"/>
  <rect x="61" y="74" width="6" height="17" rx="3" fill="#feb656"/>

  <!-- Hooves -->
  <rect x="33" y="88" width="8" height="4" rx="2" fill="#e8820c"/>
  <rect x="43" y="88" width="8" height="4" rx="2" fill="#e8820c"/>
  <rect x="53" y="88" width="8" height="4" rx="2" fill="#e8820c"/>
  <rect x="60" y="88" width="8" height="4" rx="2" fill="#e8820c"/>

  <!-- Tail -->
  <path d="M 72 58 Q 82 55 78 48" fill="none" stroke="#feb656" stroke-width="3" stroke-linecap="round"/>
  <circle cx="78" cy="46" r="3" fill="#e8820c"/>
</svg>
